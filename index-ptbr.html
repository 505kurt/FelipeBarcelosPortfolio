<!DOCTYPE html>
<html lang="pt-br">
<meta charset="UTF-8">
<head>
    <title>Felipe Barcelos - Portfolio</title>
    <link rel="icon" href="images/icon.png">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <div class="header">
            <span class="name">FELIPE BARCELOS</span>
            <div class="header-options">
                <button class="header-buttons" id="about-button" href="#about" onclick="toggleGlow(this)">SOBRE</button>
                <button class="header-buttons" id="projects-button" href="#projects" onclick="toggleGlow(this)">PROJETOS</button>
                <button class="header-buttons" id="contact-button" href="#contact" onclick="toggleGlow(this)">CONTATO</button>
            </div>
            <div class="dark-mode">
                <button class="dark-mode-toggler">
                    <img class="icon-sun" src="images/sun.png">
                    <img class="icon-moon" src="images/moon.png">
                </button>
            </div>
        </div>
    </header>
    <main>
        <section id="about">
            <div class="body-about">
                <div class="text-about">
                    <span class="title-medium">DESENVOLVEDOR</span><br>
                    <span class="title-big">FULL STACK</span>
                    <p>Meu nome é Felipe Barcelos - um <span class="p-highlight">desenvolvedor Full Stack</span> apaixonado por<br>criar soluções inteligentes em programação.</p>
                </div>
                <img class="image-about" src="images/Tiringa png.png">
            </div>
        </section>
        <section id="projects">

        </section>
        <section id="contact">

        </section>
    </main>
    <footer>

    </footer>
    <script src="scripts/script.js"></script>
</body>
</html>
